<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Invoice Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .main-content {
            padding: 30px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1e3c72;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .items-table-container {
            margin-top: 20px;
            overflow-x: auto;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .items-table th, .items-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .items-table th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }

        .items-table input {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        .btn-add-item {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .btn-add-item:hover {
            background: #218838;
        }

        .btn-remove {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        .btn-remove:hover {
            background: #c82333;
        }

        .action-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #1e3c72;
            color: white;
        }

        .btn-primary:hover {
            background: #2a5298;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-print {
            background: #17a2b8;
            color: white;
        }

        .btn-print:hover {
            background: #138496;
        }

        .preview-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .preview-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
        }

        .preview-table th, .preview-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .preview-table th {
            background: #f0f0f0;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏪 GST Invoice Management System</h1>
        <p>Professional Invoice Generator with Print Feature</p>
    </div>

    <div class="main-content">
        <div class="input-section">
            <div class="section-title">📝 Invoice Details</div>
            
            <div class="form-row">
                <div>
                    <div class="form-group">
                        <label>Customer Name *</label>
                        <input type="text" id="customerName" value="SHIVAM KUMAR" placeholder="Enter customer name">
                    </div>
                    
                    <div class="form-group">
                        <label>Customer Address</label>
                        <textarea id="customerAddress">KOYLA NAGAR KANPUR</textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="mobileNo" value="9044269139" placeholder="Enter mobile number">
                    </div>
                </div>
                
                <div>
                    <div class="form-group">
                        <label>State</label>
                        <select id="state">
                            <option value="09 - UTTAR PRADESH">09 - UTTAR PRADESH</option>
                            <option value="10 - DELHI">10 - DELHI</option>
                            <option value="27 - MAHARASHTRA">27 - MAHARASHTRA</option>
                            <option value="29 - KARNATAKA">29 - KARNATAKA</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Invoice No.</label>
                        <input type="text" id="invoiceNo" value="GI2627/1064" placeholder="Enter invoice number">
                    </div>
                    
                    <div class="form-group">
                        <label>Invoice Date</label>
                        <input type="date" id="invoiceDate" value="2026-06-14">
                    </div>
                </div>
            </div>

            <div class="section-title" style="margin-top: 20px;">📦 Items Details</div>
            <div class="items-table-container">
                <table class="items-table" id="itemsTable">
                    <thead>

                            <th>HSN Code</th>
                            <th>Purity</th>

                    <tbody id="itemsBody">
                        <tr>
                            <td><input type="text" class="item-name" value="GOLD ORNAMENT ring 1"></td>
                            <td><input type="text" class="item-huid" value="711319"></td>
                            <td><input type="text" class="item-hsn" value="711319"></td>
                            <td><input type="text" class="item-purity" value="18K"></td>
                            <td><input type="number" class="item-gross" value="1.870" step="0.001"></td>
                            <td><input type="number" class="item-net" value="1.870" step="0.001"></td>
                            <td><input type="number" class="item-rate" value="11400" step="1"></td>

                        <tr>

                            <td><input type="text" class="item-hsn" value="711319"></td>
                            <td><input type="text" class="item-purity" value="18K"></td>

                            <td><input type="number" class="item-net" value="1.540" step="0.001"></td>
                            <td><input type="number" class="item-rate" value="11400" step="1"></td>
                            <td><input type="number" class="item-labour" value="2240" step="1"></td>

<script>
    // Add new item row
    function addItemRow() {
        const tbody = document.getElementById('itemsBody');
        const newRow = tbody.insertRow();
        newRow.innerHTML = `
            <td><input type="text" class="item-name" placeholder="Item name"></td>
            <td><input type="text" class="item-huid" placeholder="HUID"></td>
            <td><input type="text" class="item-hsn" placeholder="HSN Code"></td>
            <td><input type="text" class="item-purity" placeholder="Purity"></td>
            <td><input type="number" class="item-gross" step="0.001" placeholder="Gross Wt"></td>
            <td><input type="number" class="item-net" step="0.001" placeholder="Net Wt"></td>
            <td><input type="number" class="item-rate" step="1" placeholder="Rate"></td>
            <td><input type="number" class="item-labour" step="1" placeholder="Labour"></td>
            <td><button class="btn-remove" onclick="removeRow(this)">✖ Remove</button></td>
        `;
        updatePreview();
    }

    // Remove row
    function removeRow(button) {
        const row = button.closest('tr');
        row.remove();
        updatePreview();
    }

    // Calculate all totals
    function calculateAllTotals() {
        const items = document.querySelectorAll('#itemsBody tr');
        let totalValue = 0;
        let totalLabour = 0;
        let totalGrossWeight = 0;
        let totalNetWeight = 0;
        let itemsData = [];

        items.forEach(item => {
            const itemName = item.querySelector('.item-name')?.value || '';
            const huid = item.querySelector('.item-huid')?.value || '';
            const hsn = item.querySelector('.item-hsn')?.value || '';
            const purity = item.querySelector('.item-purity')?.value || '';
            const grossWeight = parseFloat(item.querySelector('.item-gross')?.value) || 0;
            const netWeight = parseFloat(item.querySelector('.item-net')?.value) || 0;
            const rate = parseFloat(item.querySelector('.item-rate')?.value) || 0;
            const labour = parseFloat(item.querySelector('.item-labour')?.value) || 0;
            
            const value = rate * netWeight;
            const amount = value + labour;
            
            totalValue += value;
            totalLabour += labour;
            totalGrossWeight += grossWeight;
            totalNetWeight += netWeight;
            
            itemsData.push({
                itemName, huid, hsn, purity, grossWeight, netWeight, rate, value, labour, amount
            });
        });

        return { totalValue, totalLabour, totalGrossWeight, totalNetWeight, itemsData };
    }

    // Get invoice data
    function getInvoiceData() {
        const customerName = document.getElementById('customerName').value;
        const customerAddress = document.getElementById('customerAddress').value;
        const mobileNo = document.getElementById('mobileNo').value;
        const state = document.getElementById('state').value;
        const invoiceNo = document.getElementById('invoiceNo').value;
        const invoiceDate = document.getElementById('invoiceDate').value;
        const discount = parseFloat(document.getElementById('discount').value) || 0;
        const receiptUPI = parseFloat(document.getElementById('receiptUPI').value) || 0;
        const receiptCash = parseFloat(document.getElementById('receiptCash').value) || 0;
        const gstRate = parseFloat(document.getElementById('gstRate').value) || 1.5;

        const { totalValue, totalLabour, totalGrossWeight, totalNetWeight, itemsData } = calculateAllTotals();
        
        const subtotal = totalValue + totalLabour;
        const taxableAmount = subtotal - discount;
        const cgst = taxableAmount * (gstRate / 100);
        const sgst = taxableAmount * (gstRate / 100);
        const grandTotal = taxableAmount + cgst + sgst;
        const totalGST = cgst + sgst;
        
        return {
            customerName, customerAddress, mobileNo, state, invoiceNo, invoiceDate,
            discount, receiptUPI, receiptCash, gstRate,
            totalValue, totalLabour, totalGrossWeight, totalNetWeight, itemsData,
            subtotal, taxableAmount, cgst, sgst, grandTotal, totalGST
        };
    }

    // Convert number to words
    function numberToWords(num) {
        if (num === 0) return 'Zero';
        const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine'];
        const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        const teens = ['Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
        
        function convertHundreds(n) {
            let str = '';
            if (n >= 100) {
                str += ones[Math.floor(n / 100)] + ' Hundred ';
                n %= 100;
            }
            if (n >= 20) {
                str += tens[Math.floor(n / 10)] + ' ';
                n %= 10;
            } else if (n >= 10) {
                str += teens[n - 10] + ' ';
                n = 0;
            }
            if (n > 0) {
                str += ones[n] + ' ';
            }
            return str.trim();
        }
        
        let result = '';
        if (num >= 100000) {
            result += convertHundreds(Math.floor(num / 100000)) + ' Lakh ';
            num %= 100000;
        }
        if (num >= 1000) {
            result += convertHundreds(Math.floor(num / 1000)) + ' Thousand ';
            num %= 1000;
        }
        if (num > 0) {
            result += convertHundreds(num);
        }
        return result.trim();
    }

    // Update quick preview
    function updatePreview() {
        const data = getInvoiceData();
        const previewDiv = document.getElementById('quickPreview');
        
        if (data.itemsData.length === 0) {
            previewDiv.innerHTML = '<p style="color: #666; text-align: center;">No items added. Please add at least one item.</p>';
            return;
        }
        
        previewDiv.innerHTML = `
            <table class="preview-table">
                <tr style="background-color: #e3f2fd;">
                    <th>Total Items</th>
                    <td>${data.itemsData.length}</td>
                    <th>Total Net Weight</th>
                    <td>${data.totalNetWeight.toFixed(3)} g</td>
                </tr>
                <tr>
                    <th>Total Value</th>
                    <td>₹ ${data.totalValue.toFixed(2)}</td>
                    <th>Total Labour</th>
                    <td>₹ ${data.totalLabour.toFixed(2)}</td>
                </tr>
                <tr>
                    <th>Subtotal</th>
                    <td>₹ ${(data.totalValue + data.totalLabour).toFixed(2)}</td>
                    <th>Discount</th>
                    <td>₹ ${data.discount.toFixed(2)}</td>
                </tr>
                <tr>
                    <th>Taxable Amount</th>
                    <td>₹ ${data.taxableAmount.toFixed(2)}</td>
                    <th>GST (${data.gstRate}% + ${data.gstRate}%)</th>
                    <td>₹ ${data.totalGST.toFixed(2)}</td>
                </tr>
                <tr style="background-color: #e8f5e9; font-weight: bold;">
                    <th>Grand Total</th>
                    <td colspan="3">₹ ${data.grandTotal.toFixed(2)}</td>
                </tr>
                <tr>
                    <th>Payment Received</th>
                    <td colspan="3">₹ ${(data.receiptUPI + data.receiptCash).toFixed(2)}</td>
                </tr>
                <tr style="background-color: #fff3e0;">
                    <th>Balance Due</th>
                    <td colspan="3" style="color: #dc3545; font-weight: bold;">₹ ${(data.grandTotal - (data.receiptUPI + data.receiptCash)).toFixed(2)}</td>
                </tr>
            </table>
        `;
    }

    // Main Print Function - Opens invoice in new window and prints
    function printInvoice() {
        const data = getInvoiceData();
        
        // Check if there are items
        if (data.itemsData.length === 0) {
            alert('Please add at least one item before printing!');
            return;
        }
        
        // Format date
        const formattedDate = new Date(data.invoiceDate).toLocaleDateString('en-IN', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });
        
        // Generate items HTML
        let itemsHtml = '';
        data.itemsData.forEach((item) => {
            itemsHtml += `
                <tr>
                    <td style="border:1px solid #000; padding:8px;">${item.itemName}</td>
                    <td style="border:1px solid #000; padding:8px;">${item.huid}</td>
                    <td style="border:1px solid #000; padding:8px;">${item.hsn}</td>
                    <td style="border:1px solid #000; padding:8px;">${item.purity}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.grossWeight.toFixed(3)}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.netWeight.toFixed(3)}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.rate.toFixed(2)}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.value.toFixed(2)}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.labour.toFixed(2)}</td>
                    <td style="border:1px solid #000; padding:8px; text-align:right;">${item.amount.toFixed(2)}</td>
                </tr>
            `;
        });
        
        // Create complete invoice HTML
        const invoiceHTML = `
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <title>TAX INVOICE - ${data.invoiceNo}</title>
                <style>
                    * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                    }
                    body {
                        font-family: 'Courier New', monospace;
                        padding: 20px;
                        background: white;
                    }
                    .invoice {
                        max-width: 1200px;
                        margin: 0 auto;
                    }
                    .header {
                        text-align: center;
                        margin-bottom: 20px;
                        padding-bottom: 10px;
                        border-bottom: 2px solid #000;
                    }
                    .header h1 {
                        font-size: 24px;
                        margin-bottom: 5px;
                    }
                    .customer-section {
                        margin-bottom: 20px;
                        padding: 10px;
                        border: 1px solid #ddd;
                        background: #f9f9f9;
                    }
                    .items-table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-bottom: 20px;
                        font-size: 11px;
                    }
                    .items-table th {
                        background: #f0f0f0;
                        font-weight: bold;
                        border: 1px solid #000;
                        padding: 8px;
                        text-align: center;
                    }
                    .items-table td {
                        border: 1px solid #000;
                        padding: 8px;
                    }
                    .summary-table {
                        width: 50%;
                        border-collapse: collapse;
                        margin-left: auto;
                        margin-bottom: 20px;
                    }
                    .summary-table td {
                        border: 1px solid #000;
                        padding: 8px;
                    }
                    .payment-table {
                        width: 50%;
                        border-collapse: collapse;
                        margin-bottom: 20px;
                    }
                    .payment-table td {
                        border: 1px solid #000;
                        padding: 8px;
                    }
                    .amount-words {
                        margin: 15px 0;
                        padding: 10px;
                        background: #f9f9f9;
                        border-left: 3px solid #1e3c72;
                    }
                    .footer {
                        margin-top: 30px;
                        padding-top: 10px;
                        border-top: 1px dashed #000;
                        text-align: center;
                        font-size: 10px;
                    }
                    .print-button {
                        text-align: center;
                        margin-bottom: 20px;
                    }
                    .print-button button {
                        padding: 10px 20px;
                        font-size: 14px;
                        cursor: pointer;
                        background: #17a2b8;
                        color: white;

                        border-radius: 5px;
                    }
                    @media print {
                        .print-button {

            </head>
            <body>
                <div class="print-button">
                    <button onclick="window.print()">🖨️ Print This Invoice</button>

                        <tbody>

        // Open new window and write the invoice

    // Auto-update preview on input changes
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('input', updatePreview);
        });
        updatePreview();
    });
