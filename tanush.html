<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Website</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5}
header{
background:#1e293b;
color:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}
nav a{
color:white;
margin-left:20px;
text-decoration:none;
}
.hero{
height:85vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
text-align:center;
}
.hero h1{
font-size:50px;
margin-bottom:15px;
}
.hero p{
font-size:20px;
margin-bottom:25px;
}
button{
padding:12px 30px;
border:none;
background:white;
color:#2563eb;
font-size:18px;
border-radius:30px;
cursor:pointer;
}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px 8%;
}
.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
transition:.3s;
}
.card:hover{
transform:translateY(-10px);
}
footer{
background:#1e293b;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>
<body>

<header>
<h2>MyBrand</h2>
<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Build Your Future</h1>
<p>Modern Website Demo using HTML & CSS</p>
<button onclick="showMsg()">Get Started</button>
</section>

<section class="cards">
<div class="card">
<h2>Fast</h2>
<p>Lightning fast performance.</p>
</div>

<div class="card">
<h2>Responsive</h2>
<p>Works on Mobile, Tablet & Desktop.</p>
</div>

<div class="card">
<h2>Secure</h2>
<p>Modern security practices.</p>
</div>
</section>

<footer>
© 2026 MyBrand. All Rights Reserved.
</footer>

<script>
function showMsg(){
alert("Welcome to the Demo Website 🚀");
}
</script>

</body>
</html>
